<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flytta Smart — Demo</title>
<style>
  /* ── Reset & Base ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yellow:     #F5C800;
    --yellow-d:   #C9A200;
    --yellow-l:   #FFF9DC;
    --black:      #1A1A1A;
    --gray-d:     #3D3D3D;
    --gray-m:     #6B6B6B;
    --gray-l:     #F4F4F2;
    --gray-b:     #E8E8E5;
    --white:      #FFFFFF;
    --radius:     10px;
    --shadow:     0 2px 16px rgba(0,0,0,0.08);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #F0EFE9;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 64px;
  }

  /* ── Page header ── */
  .page-header {
    width: 100%;
    max-width: 520px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .logo-mark {
    background: var(--yellow);
    border-radius: 8px;
    width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 18px; color: var(--black);
    flex-shrink: 0;
  }
  .logo-text { font-size: 20px; font-weight: 700; color: var(--black); letter-spacing: -0.3px; }
  .logo-sub  { font-size: 12px; color: var(--gray-m); margin-top: 1px; }

  /* ── Widget shell ── */
  .widget {
    background: var(--white);
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 100%; max-width: 520px;
    overflow: hidden;
  }

  /* ── Header strip ── */
  .w-header {
    background: var(--black);
    padding: 20px 24px 16px;
    border-bottom: 3px solid var(--yellow);
  }
  .w-header h2 { font-size: 17px; font-weight: 700; color: #FFFFFF; }
  .w-header p  { font-size: 13px; color: rgba(255,255,255,0.75); margin-top: 3px; }

  /* ── Progress dots ── */
  .progress {
    display: flex; gap: 5px;
    padding: 14px 24px 0;
  }
  .dot {
    height: 3px; flex: 1; border-radius: 2px;
    background: var(--gray-b);
    transition: background .2s;
  }
  .dot.done   { background: var(--black); }
  .dot.active { background: var(--yellow); }

  /* ── Body ── */
  .w-body { padding: 20px 24px 24px; }

  /* ── Labels ── */
  .field-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .07em; color: var(--gray-m);
    margin-bottom: 8px; display: block;
  }

  /* ── Text inputs ── */
  .text-input {
    width: 100%; padding: 11px 13px;
    border: 1.5px solid var(--gray-b);
    border-radius: var(--radius);
    font-size: 14px; font-family: inherit;
    color: var(--black); background: var(--white);
    margin-bottom: 14px; outline: none;
    transition: border-color .15s;
  }
  .text-input:focus { border-color: #0F6E56; }
  .text-input.confirmed { border-color: #22A06B; background: #F0FBF5; }

  /* ── Autocomplete ── */
  .addr-wrap { position: relative; }
  .autocomplete-list {
    position: absolute; top: calc(100% - 10px); left: 0; right: 0;
    background: var(--white);
    border: 1.5px solid var(--gray-b); border-top: none;
    border-radius: 0 0 var(--radius) var(--radius);
    z-index: 99; display: none; overflow: hidden;
  }
  .ac-item {
    padding: 10px 13px; font-size: 13px; cursor: pointer;
    display: flex; align-items: center; gap: 10px;
    border-top: 1px solid var(--gray-b);
    color: var(--black);
  }
  .ac-item:hover { background: #E1F5EE; }
  .ac-item svg { flex-shrink: 0; }
  .ac-main { font-weight: 500; }
  .ac-sub  { font-size: 11px; color: var(--gray-m); }
  .confirmed-tag {
    font-size: 11px; color: #22A06B; font-weight: 500;
    margin-top: -10px; margin-bottom: 10px; display: none;
  }

  /* ── Option grid ── */
  .opt-grid {
    display: grid; gap: 8px; margin-bottom: 16px;
  }
  .opt-grid.cols2 { grid-template-columns: 1fr 1fr; }
  .opt-grid.cols3 { grid-template-columns: repeat(3, 1fr); }

  .opt-btn {
    padding: 11px 8px;
    border: 1.5px solid var(--gray-b); border-radius: var(--radius);
    background: var(--white); cursor: pointer;
    font-size: 13px; font-family: inherit; color: var(--black);
    text-align: center; line-height: 1.3;
    transition: border-color .1s, background .1s;
  }
  .opt-btn:hover  { border-color: var(--yellow-d); }
  .opt-btn.sel    { border: 2px solid #0F6E56; background: #E1F5EE; font-weight: 600; }
  .opt-btn small  { display: block; font-size: 11px; color: var(--gray-m); margin-top: 2px; font-weight: 400; }
  .opt-btn.sel small { color: var(--gray-d); }

  /* ── Checkboxes ── */
  .check-row {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 12px; border: 1.5px solid var(--gray-b);
    border-radius: var(--radius); margin-bottom: 8px; cursor: pointer;
    transition: background .1s;
  }
  .check-row:hover { background: var(--gray-l); }
  .check-row input { accent-color: var(--yellow); width: 16px; height: 16px; }
  .check-row label { font-size: 14px; cursor: pointer; flex: 1; }
  .check-row .chk-price { font-size: 13px; color: var(--gray-m); white-space: nowrap; }

  /* ── Price bar ── */
  .price-bar {
    background: var(--black); border-radius: var(--radius);
    padding: 16px 18px; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .pb-left  .label { font-size: 12px; color: #888; }
  .pb-left  .full  { font-size: 15px; color: #AAA; text-decoration: line-through; margin-top: 2px; }
  .pb-right .label { font-size: 12px; color: var(--yellow); text-align: right; }
  .pb-right .rut   { font-size: 26px; font-weight: 700; color: var(--white); text-align: right; }

  /* ── Nav ── */
  .nav { display: flex; gap: 8px; margin-top: 8px; }
  .btn-back {
    padding: 11px 18px; border: 1.5px solid var(--gray-b); border-radius: var(--radius);
    background: none; cursor: pointer; font-size: 14px; font-family: inherit;
    color: var(--gray-m);
  }
  .btn-next {
    flex: 1; padding: 12px 18px; border: none; border-radius: var(--radius);
    background: var(--yellow); cursor: pointer; font-size: 14px;
    font-weight: 700; font-family: inherit; color: var(--black);
    transition: background .1s;
  }
  .btn-next:hover    { background: var(--yellow-d); }
  .btn-next:disabled { background: var(--gray-b); color: var(--gray-m); cursor: default; }

  /* ── Contact fields ── */
  .contact-field { margin-bottom: 12px; }

  /* ── Success ── */
  .success-view { text-align: center; padding: 28px 8px; }
  .success-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: #0F6E56; display: flex; align-items: center;
    justify-content: center; margin: 0 auto 16px; font-size: 22px;
  }
  .success-view h3 { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: var(--black); }
  .success-view p  { font-size: 14px; color: var(--gray-m); line-height: 1.6; }
  .pill {
    display: inline-block; background: var(--gray-l); border-radius: 20px;
    padding: 4px 12px; font-size: 13px; color: var(--gray-d); margin: 3px;
  }
  .pill.yellow { background: #E1F5EE; color: #0F6E56; font-weight: 600; }

  /* ── Footer ── */
  .w-footer {
    text-align: center; padding: 12px 24px;
    border-top: 1px solid var(--gray-b);
    font-size: 11px; color: var(--gray-m);
  }

  /* ── Demo badge ── */
  .demo-badge {
    max-width: 520px; width: 100%;
    background: var(--yellow); border-radius: 8px;
    padding: 10px 16px; margin-bottom: 12px;
    font-size: 12px; font-weight: 600; color: var(--black);
    display: flex; align-items: center; gap: 8px;
  }
</style>
</head>
<body>

<div class="demo-badge">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6.5" stroke="white"/><path d="M7 4v4M7 10v.5" stroke="white" stroke-width="1.5" stroke-linecap="round"/></svg>
  Flytta Smart — Interaktiv Demo
</div>

<div class="page-header">
  <div class="logo-mark" style="font-size:11px;font-weight:800;letter-spacing:-0.5px">FS</div>
  <div>
    <div class="logo-text" style="color:var(--black)">Flytta Smart</div>
    <div class="logo-sub" style="color:var(--gray-m)">Din byrå · Din stad · Dina leads</div>
  </div>
</div>

<div class="widget">
  <div class="w-header">
    <h2 id="step-title">Vad kostar din flytt?</h2>
    <p id="step-desc">Fyll i din flytt och se pris direkt — utan att vänta på offert</p>
  </div>

  <div class="progress" id="dots"></div>
  <div class="w-body" id="step-content"></div>

  <div class="w-footer">Pris visas direkt · Exklusiva leads · RUT-avdrag inkluderat</div>
</div>

<script>
// ── Data ─────────────────────────────────────────────────────────────────────
const SIZES = [
  { label: '1 rum',  sub: '~30 kvm',   base: 2999 },
  { label: '2 rum',  sub: '~55 kvm',   base: 4499 },
  { label: '3 rum',  sub: '~75 kvm',   base: 5999 },
  { label: '4 rum',  sub: '~100 kvm',  base: 7499 },
  { label: '5+ rum', sub: '~130+ kvm', base: 9999 },
];
const ADDONS = [
  { key: 'pack', label: 'Packhjälp',     sub: 'Vi packar alla kartonger',       price: 1500 },
  { key: 'stad', label: 'Flyttstädning', sub: 'Inkl. besiktningsgaranti 10 dagar', price: 1999 },
  { key: 'mag',  label: 'Magasinering',  sub: 'Upp till 30 dagar',              price: 800  },
];
const FLOORS = [
  { label: 'Liten hiss',   sub: 'Plats för 1–2 pers',   val: 0   },
  { label: 'Stor hiss',    sub: 'Rymmer möbler',         val: 0   },
  { label: '1–2 trappor',  sub: 'Utan hiss',             val: 300 },
  { label: '3+ trappor',   sub: 'Utan hiss',             val: 700 },
];
const MOCK = {
  v: ['Vasagatan 1, Stockholm','Vallhallavägen 12, Stockholm','Vintervägen 5, Solna'],
  h: ['Hornsgatan 5, Stockholm','Hamngatan 8, Göteborg'],
  s: ['Storgatan 10, Malmö','Sveavägen 44, Stockholm'],
  k: ['Kungsgatan 15, Stockholm','Karlsrogatan 7, Uppsala'],
  default: ['Strandvägen 1, Stockholm','Linnégatan 10, Göteborg','Drottningtorget 5, Malmö'],
};
function suggest(q) {
  if (!q || q.length < 2) return [];
  const k = q[0].toLowerCase();
  return (MOCK[k] || MOCK.default).filter(a => a.toLowerCase().includes(q.toLowerCase())).slice(0,4);
}

// ── State ─────────────────────────────────────────────────────────────────────
let S = { step:0, from:'', fromOK:false, to:'', toOK:false, date:'',
          type:null, size:null, floor:null, addons:{}, name:'', email:'', phone:'' };

// ── Helpers ───────────────────────────────────────────────────────────────────
const kr = n => Math.round(n).toLocaleString('sv-SE') + ' kr';

function calcPrice() {
  if (S.size === null) return 0;
  const base  = SIZES[S.size].base;
  const floor = S.floor !== null ? FLOORS[S.floor].val : 0;
  const adds  = ADDONS.filter(a => S.addons[a.key]).reduce((s,a) => s + a.price, 0);
  const hus   = S.type === 'hus' ? 800 : 0;
  return base + floor + adds + hus;
}

function pricebar() {
  const t = calcPrice(); if (!t) return '';
  const r = Math.round(t * 0.5);
  const tags = [];
  if (S.size !== null) tags.push(SIZES[S.size].label + (S.type === 'hus' ? ' hus' : ' lgh'));
  if (S.floor !== null && FLOORS[S.floor].val > 0) tags.push(FLOORS[S.floor].label);
  ADDONS.filter(a => S.addons[a.key]).forEach(a => tags.push(a.label));
  return `
  <div class="price-bar">
    <div class="pb-left">
      <div class="label">Pris inkl. moms</div>
      <div class="full">${kr(t)}</div>
    </div>
    <div class="pb-right">
      <div class="label">Efter RUT-avdrag</div>
      <div class="rut">${kr(r)}</div>
    </div>
  </div>`;
}

function addrField(id, placeholder, val, ok) {
  return `
  <div class="addr-wrap" id="wrap-${id}">
    <input id="${id}" class="text-input${ok?' confirmed':''}"
      type="text" placeholder="${placeholder}" value="${val}" autocomplete="off">
    <div class="confirmed-tag" id="ctag-${id}" style="display:${ok?'block':'none'}">✓ Adress bekräftad</div>
    <div class="autocomplete-list" id="list-${id}"></div>
  </div>`;
}

function bindAddr(id, stateKey, okKey, cb) {
  const inp  = document.getElementById(id);
  const list = document.getElementById('list-' + id);
  const ctag = document.getElementById('ctag-' + id);
  if (!inp) return;
  inp.addEventListener('input', () => {
    S[stateKey] = inp.value;
    S[okKey] = false;
    inp.classList.remove('confirmed');
    ctag.style.display = 'none';
    const sug = suggest(inp.value);
    if (sug.length && inp.value.length >= 2) {
      list.style.display = 'block';
      list.innerHTML = sug.map(s => `
        <div class="ac-item" data-addr="${s}">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1C4.79 1 3 2.79 3 5c0 3.25 4 8 4 8s4-4.75 4-8c0-2.21-1.79-4-4-4z" fill="#F5C800" stroke="#C9A200" stroke-width=".5"/><circle cx="7" cy="5" r="1.5" fill="#1A1A1A"/></svg>
          <div><div class="ac-main">${s.split(',')[0]}</div><div class="ac-sub">${s.split(',').slice(1).join(',').trim()}</div></div>
        </div>`).join('');
      list.querySelectorAll('.ac-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          S[stateKey] = el.dataset.addr;
          S[okKey] = true;
          inp.value = el.dataset.addr;
          inp.classList.add('confirmed');
          ctag.style.display = 'block';
          list.style.display = 'none';
          if (cb) cb();
        });
      });
    } else { list.style.display = 'none'; }
  });
  inp.addEventListener('blur', () => setTimeout(() => { list.style.display = 'none'; }, 160));
}

// ── Steps ─────────────────────────────────────────────────────────────────────
const STEPS = [
  {
    title: 'Var ska du flytta?',
    desc:  'Sök och välj adresser nedan',
    html() {
      return `
        <label class="field-label">Från-adress</label>
        ${addrField('f-from','Sök gatuadress, t.ex. Vasagatan 1…', S.from, S.fromOK)}
        <label class="field-label">Till-adress</label>
        ${addrField('f-to','Sök gatuadress, t.ex. Hornsgatan 5…', S.to, S.toOK)}
        <label class="field-label">Önskat datum</label>
        <input id="f-date" class="text-input" type="date" value="${S.date}" style="margin-bottom:0">
        <div class="nav" style="margin-top:16px">
          <button class="btn-next" id="btn-s0">Nästa</button>
        </div>`;
    },
    bind() {
      bindAddr('f-from','from','fromOK', checkS0);
      bindAddr('f-to','to','toOK', checkS0);
      document.getElementById('f-date').addEventListener('input', e => S.date = e.target.value);
      document.getElementById('btn-s0').addEventListener('click', () => go(1));
      checkS0();
    }
  },
  {
    title: 'Vilken typ av bostad?',
    desc:  'Välj bostadstyp och antal rum',
    html() {
      return `
        <label class="field-label">Bostadstyp</label>
        <div class="opt-grid cols2" style="margin-bottom:14px">
          <button class="opt-btn${S.type==='lagenhet'?' sel':''}" data-type="lagenhet">
            🏢 <strong>Lägenhet</strong>
            <small>Bostadsrätt eller hyresrätt</small>
          </button>
          <button class="opt-btn${S.type==='hus'?' sel':''}" data-type="hus">
            🏡 <strong>Hus / Stuga</strong>
            <small>Villa, radhus eller stuga</small>
          </button>
        </div>
        <label class="field-label">Antal rum</label>
        <div class="opt-grid cols3">
          ${SIZES.map((s,i) => `<button class="opt-btn${S.size===i?' sel':''}" data-si="${i}">${s.label}<small>${s.sub}</small></button>`).join('')}
        </div>
        ${pricebar()}
        <div class="nav">
          <button class="btn-back" id="btn-b1">Tillbaka</button>
          <button class="btn-next" id="btn-s1">Nästa</button>
        </div>`;
    },
    bind() {
      document.querySelectorAll('[data-type]').forEach(b =>
        b.addEventListener('click', () => { S.type = b.dataset.type; render(); }));
      document.querySelectorAll('[data-si]').forEach(b =>
        b.addEventListener('click', () => { S.size = +b.dataset.si; render(); }));
      document.getElementById('btn-b1').addEventListener('click', () => go(0));
      document.getElementById('btn-s1').addEventListener('click', () => go(2));
      document.getElementById('btn-s1').disabled = S.type === null || S.size === null;
    }
  },
  {
    title: 'Trappor och hiss?',
    desc:  'Gäller vid utflyttningsadressen',
    html() {
      return `
        <div class="opt-grid cols2">
          ${FLOORS.map((f,i) => `
            <button class="opt-btn${S.floor===i?' sel':''}" data-fi="${i}">
              ${f.label}<small>${f.sub}${f.val > 0 ? ' · +' + kr(f.val) : ' · ingår'}</small>
            </button>`).join('')}
        </div>
        ${pricebar()}
        <div class="nav">
          <button class="btn-back" id="btn-b2">Tillbaka</button>
          <button class="btn-next" id="btn-s2">Nästa</button>
        </div>`;
    },
    bind() {
      document.querySelectorAll('[data-fi]').forEach(b =>
        b.addEventListener('click', () => { S.floor = +b.dataset.fi; render(); }));
      document.getElementById('btn-b2').addEventListener('click', () => go(1));
      document.getElementById('btn-s2').addEventListener('click', () => go(3));
      document.getElementById('btn-s2').disabled = S.floor === null;
    }
  },
  {
    title: 'Lägg till tjänster',
    desc:  'Tillval med RUT-avdrag',
    html() {
      return `
        ${ADDONS.map(a => `
          <div class="check-row" data-ak="${a.key}">
            <input type="checkbox" id="cb-${a.key}" ${S.addons[a.key]?'checked':''}>
            <label for="cb-${a.key}">${a.label}<br><small style="color:#6B6B6B;font-size:12px">${a.sub}</small></label>
            <span class="chk-price">+${kr(a.price)}</span>
          </div>`).join('')}
        ${pricebar()}
        <div class="nav">
          <button class="btn-back" id="btn-b3">Tillbaka</button>
          <button class="btn-next" id="btn-s3">Se mitt pris</button>
        </div>`;
    },
    bind() {
      ADDONS.forEach(a => {
        document.getElementById('cb-' + a.key).addEventListener('change', e => {
          S.addons[a.key] = e.target.checked; render();
        });
        document.querySelector('[data-ak="'+a.key+'"]').addEventListener('click', e => {
          if (e.target.tagName === 'INPUT') return;
          S.addons[a.key] = !S.addons[a.key]; render();
        });
      });
      document.getElementById('btn-b3').addEventListener('click', () => go(2));
      document.getElementById('btn-s3').addEventListener('click', () => go(4));
    }
  },
  {
    title: 'Ditt prisestimat',
    desc:  'Fyll i dina uppgifter — vi bekräftar inom 2 timmar',
    html() {
      return `
        ${pricebar()}
        <div class="contact-field">
          <label class="field-label">Namn</label>
          <input id="f-name"  class="text-input" type="text"  placeholder="Anna Svensson"    value="${S.name}"  style="margin-bottom:0">
        </div>
        <div class="contact-field">
          <label class="field-label">E-post</label>
          <input id="f-email" class="text-input" type="email" placeholder="anna@exempel.se"  value="${S.email}" style="margin-bottom:0">
        </div>
        <div class="contact-field">
          <label class="field-label">Telefon</label>
          <input id="f-phone" class="text-input" type="tel"   placeholder="070-000 00 00"    value="${S.phone}" style="margin-bottom:0">
        </div>
        <div class="nav" style="margin-top:16px">
          <button class="btn-back" id="btn-b4">Tillbaka</button>
          <button class="btn-next" id="btn-s4">Bekräfta förfrågan</button>
        </div>`;
    },
    bind() {
      document.getElementById('f-name').addEventListener('input',  e => { S.name=e.target.value;  checkS4(); });
      document.getElementById('f-email').addEventListener('input', e => { S.email=e.target.value; checkS4(); });
      document.getElementById('f-phone').addEventListener('input', e => { S.phone=e.target.value; checkS4(); });
      document.getElementById('btn-b4').addEventListener('click', () => go(3));
      document.getElementById('btn-s4').addEventListener('click', submit);
      checkS4();
    }
  }
];

function checkS0() {
  const b = document.getElementById('btn-s0');
  if (b) b.disabled = !(S.from.trim() && S.to.trim());
}
function checkS4() {
  const b = document.getElementById('btn-s4');
  if (b) b.disabled = !(S.name.trim() && S.email.trim() && S.phone.trim());
}

function go(n) { S.step = n; render(); }

function render() {
  const def = STEPS[S.step];
  document.getElementById('step-title').textContent = def.title;
  document.getElementById('step-desc').textContent  = def.desc;
  const dots = document.getElementById('dots');
  dots.innerHTML = STEPS.map((_,i) =>
    `<div class="dot${i < S.step ? ' done' : i === S.step ? ' active' : ''}"></div>`).join('');
  document.getElementById('step-content').innerHTML = def.html();
  def.bind();
}

function submit() {
  const t = calcPrice(), r = Math.round(t * 0.5);
  const sz   = S.size !== null ? SIZES[S.size].label : '';
  const adds = ADDONS.filter(a => S.addons[a.key]).map(a => a.label);
  document.getElementById('step-title').textContent = 'Tack för din förfrågan!';
  document.getElementById('step-desc').textContent  = '';
  document.getElementById('dots').innerHTML = '';
  document.getElementById('step-content').innerHTML = `
    <div class="success-view">
      <div class="success-icon">✓</div>
      <h3>Vi hör av oss inom 2 timmar, ${S.name.split(' ')[0]}!</h3>
      <p style="margin-bottom:16px">Din förfrågan är mottagen. En av våra flytt&shy;koordinatorer kontaktar dig på <strong>${S.phone}</strong> för att bekräfta.</p>
      <div style="margin-bottom:16px">
        <span class="pill yellow">${kr(r)} efter RUT</span>
        <span class="pill">${sz} ${S.type==='hus'?'hus':'lägenhet'}</span>
        <span class="pill">${S.from.split(',')[0]}</span>
        ${adds.map(a => `<span class="pill">${a}</span>`).join('')}
      </div>
      <p style="font-size:12px;color:#AAA">Estimat: ${kr(t)} inkl. moms · ${kr(r)} efter RUT-avdrag</p>
    </div>`;
}

render();
</script>
</body>
</html>
